<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise AI Agent</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white flex items-center justify-center h-screen">

    <div class="bg-gray-800 p-8 rounded-xl shadow-2xl w-full max-w-md border border-blue-500">
        <h2 class="text-2xl font-bold mb-2 flex items-center gap-2">🚀 Enterprise AI Agent</h2>
        <p class="text-gray-400 text-sm mb-6">Send a message for Sales or Support. Our AI will route it instantly and remember context!</p>
        
        <textarea id="rawText" rows="4" 
            class="w-full bg-gray-700 text-white p-3 rounded-lg border border-gray-600 focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none resize-none mb-4"
            placeholder="Type your message here..."></textarea>
            
        <button id="sendBtn" onclick="sendToAI()" 
            class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg transition-all duration-200">
            Send Message ⚡
        </button>

        <div id="status" class="mt-4 text-center text-sm font-medium hidden"></div>
    </div>

    <script>
        // Phase 7: AI KI DIARY (Memory)
        let conversationHistory = "";

        async function sendToAI() {
            const rawText = document.getElementById('rawText').value;
            const statusDiv = document.getElementById('status');
            const btn = document.getElementById('sendBtn');
            
            if(!rawText) return alert("Please type something first!");

            // Show loading
            statusDiv.innerHTML = "AI is thinking... 🧠";
            statusDiv.classList.remove('hidden', 'text-green-400', 'text-red-400');
            statusDiv.classList.add('text-blue-400');
            btn.disabled = true;
            btn.classList.add('opacity-50', 'cursor-not-allowed');

            try {
                // Vercel par data bhejna (Sath mein purani baatein bhi)
                const response = await fetch('https://ai-lead-agent-rho.vercel.app/capture-lead', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'X-API-Key': 'Tabish_Pro_Agent_2026_Secret' 
                    },
                    body: JSON.stringify({ 
                        raw_text: rawText,
                        chat_history: conversationHistory // Nayi cheez yahan bheji hai
                    })
                });

                const result = await response.json();

                if(response.ok) {
                    statusDiv.innerHTML = "Success! Routed to Team. ✅";
                    statusDiv.classList.replace('text-blue-400', 'text-green-400');
                    
                    // Message bhejne ke baad diary mein likh lo taake agli dafa yaad rahe
                    conversationHistory += "Client: " + rawText + "\n";
                    document.getElementById('rawText').value = ''; 
                } else {
                    throw new Error(result.detail || "Server Error");
                }
            } catch (error) {
                statusDiv.innerHTML = "Error sending message. ❌";
                statusDiv.classList.replace('text-blue-400', 'text-red-400');
                console.error("Error:", error);
            } finally {
                btn.disabled = false;
                btn.classList.remove('opacity-50', 'cursor-not-allowed');
            }
        }
    </script>
</body>
</html>
